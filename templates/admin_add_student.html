{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
    <h2 style="margin-bottom:18px;">Add New Student</h2>
    <form method="POST" class="stacked-form">
        <div>
            <label>Roll Number</label>
            <input type="text" name="roll_no" required>
        </div>
        <div>
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>
        <div>
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div>
            <label>Class / Section</label>
            <input type="text" name="class_section" placeholder="e.g. BCA-6A">
        </div>
        <div>
            <label>Password (for student login)</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Add Student &amp; Continue to Face Registration</button>
    </form>
</div>
{% endblock %}
